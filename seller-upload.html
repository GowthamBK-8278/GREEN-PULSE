<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sell Your Harvest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <nav class="sidebar">...</nav>

    <main class="main-content">
        <header>
            <h1>List Your Produce</h1>
            <p>Fill out the details below to reach buyers in your region.</p>
        </header>

        <section class="form-container card">
            <form id="listingForm">
                <div class="form-row">
                    <div class="input-group">
                        <label>Crop Name</label>
                        <select id="cropType" required>
                            <option value="wheat">Wheat</option>
                            <option value="corn">Corn</option>
                            <option value="rice">Rice</option>
                            <option value="soy">Soybeans</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Expected Price (per Ton)</label>
                        <input type="number" id="price" placeholder="$0.00" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Quantity Available</label>
                        <input type="text" id="quantity" placeholder="e.g. 20 Tons" required>
                    </div>
                    <div class="input-group">
                        <label>Location</label>
                        <input type="text" id="farmLoc" placeholder="Your City/State" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Product Image</label>
                    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                        <span id="uploadText">Click to upload photo of your crop</span>
                        <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(event)">
                        <img id="preview" src="#" alt="Preview" style="display:none; max-height: 150px; margin-top: 10px;">
                    </div>
                </div>

                <div class="input-group">
                    <label>Quality Details</label>
                    <textarea id="qualityNote" placeholder="Describe the grade, moisture level, or organic status..."></textarea>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Post to Market</button>
            </form>
        </section>
    </main>

    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('preview');
                output.src = reader.result;
                output.style.display = "block";
                document.getElementById('uploadText').innerText = "Image Selected ✅";
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        document.getElementById('listingForm').onsubmit = function(e) {
            e.preventDefault();
            // Here you would normally send the data to a database
            alert("Success! Your " + document.getElementById('cropType').value + " is now live in the marketplace.");
            window.location.href = "market.html";
        }
    </script>
</body>
</html>
